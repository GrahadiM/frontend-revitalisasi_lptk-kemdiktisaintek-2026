<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Revitalisasi LPTK 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%); }
        .auth-card { display: none; }
        .auth-card.active { display: block; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col items-center justify-center p-4">

    <div id="login-page" class="auth-card active w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8">
            <div class="flex justify-center gap-4 mb-6">
                <img src="https://grahadim.github.io/frontend-lldikti/assets/images/logo-tutwuri.webp" class="h-12 w-auto">
                <img src="https://grahadim.github.io/frontend-lldikti/assets/images/logo-diktisaintek.png" class="h-12 w-auto">
            </div>
            <h2 class="text-xl font-bold text-blue-950 text-center mb-1">Selamat Datang</h2>
            <p class="text-xs text-gray-500 text-center mb-8 uppercase tracking-widest font-semibold">Revitalisasi LPTK 2026</p>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Email Institusi</label>
                    <input type="email" placeholder="contoh@univ.ac.id" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Kata Sandi</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="text-right">
                    <a href="#" class="text-[10px] font-bold text-blue-600 hover:underline">Lupa Sandi?</a>
                </div>
                <button type="button" onclick="window.location.href = 'profile.html';" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Masuk</button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-500">Belum memiliki akun? <button onclick="showPage('register-page')" class="text-blue-600 font-bold hover:underline">Daftar Sekarang</button></p>
            </div>
        </div>
    </div>

    <div id="register-page" class="auth-card w-full max-w-lg bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8">
            <h2 class="text-xl font-bold text-blue-950 mb-1">Registrasi Institusi</h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-6">Pendaftaran Akun Baru LPTK</p>
            
            <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Nama Lengkap Perguruan Tinggi</label>
                    <input type="text" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">NPSN / Kode PT</label>
                    <input type="text" placeholder="0010xx" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Jenis PT</label>
                    <select class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                        <option>Negeri (PTN)</option>
                        <option>Swasta (PTS)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Email PIC</label>
                    <input type="email" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Nomor WhatsApp</label>
                    <input type="tel" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Kata Sandi</label>
                    <input type="password" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm outline-none">
                </div>
                <div class="md:col-span-2 py-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-[10px] text-gray-500 leading-tight">Saya menyetujui syarat dan ketentuan penggunaan portal Revitalisasi LPTK 2026.</span>
                    </label>
                </div>
                <button type="button" class="md:col-span-2 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all">Buat Akun Baru</button>
            </form>
            
            <button onclick="showPage('login-page')" class="w-full mt-4 text-xs text-gray-400 font-semibold hover:text-gray-600"><i class="fas fa-arrow-left mr-2"></i> Kembali ke Login</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            // Sembunyikan semua kartu
            document.querySelectorAll('.auth-card').forEach(card => {
                card.classList.remove('active');
            });
            // Tampilkan yang dipilih
            document.getElementById(pageId).classList.add('active');
        }
    </script>

</body>
</html>
